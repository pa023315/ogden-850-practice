<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>English 5000 練習台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-label="練習">
        <header class="topbar">
          <div>
            <p class="eyebrow">English Vocabulary</p>
            <h1>5000 詞練習台</h1>
          </div>
          <div class="top-actions">
            <button id="speakBtn" class="icon-btn" type="button" title="朗讀單字" aria-label="朗讀單字">▶</button>
            <button id="speakSentenceBtn" class="ghost-btn" type="button">朗讀句子</button>
            <button id="chainWordsBtn" class="ghost-btn" type="button">串念單詞</button>
            <button id="chainSentencesBtn" class="ghost-btn" type="button">串念句子</button>
            <button id="resetBtn" class="ghost-btn" type="button">重置進度</button>
          </div>
        </header>

        <section class="stats-grid" aria-label="今日狀態">
          <article>
            <span>今日待複習</span>
            <strong id="dueCount">0</strong>
          </article>
          <article>
            <span>今日完成</span>
            <strong id="doneCount">0</strong>
          </article>
          <article>
            <span>正確率</span>
            <strong id="accuracy">0%</strong>
          </article>
          <article>
            <span>錯誤詞</span>
            <strong id="wrongCount">0</strong>
          </article>
        </section>

        <section class="practice-panel" aria-live="polite">
          <div class="question-meta">
            <span id="questionKind">四選一</span>
            <span id="questionProgress">0 / 0</span>
          </div>

          <div class="prompt">
            <p id="promptLabel">準備開始</p>
            <h2 id="promptText">按「開始今日練習」</h2>
            <p id="promptHint"></p>
          </div>

          <div id="choiceGrid" class="choice-grid"></div>

          <form id="blankForm" class="blank-form" hidden>
            <input id="blankInput" type="text" autocomplete="off" spellcheck="false">
            <button type="submit">送出</button>
          </form>

          <div id="feedback" class="feedback" hidden></div>

          <div class="practice-actions">
            <button id="startBtn" class="primary-btn" type="button">開始今日練習</button>
            <button id="againBtn" class="ghost-btn" type="button" hidden>下一題</button>
          </div>
        </section>

        <section class="learning-panel" aria-label="輸出訓練">
          <div class="learning-head">
            <div>
              <p class="eyebrow">10 / 10 / 10</p>
              <h2>把單字變成會用的英文</h2>
            </div>
            <button id="useCurrentWordBtn" class="ghost-btn" type="button">使用目前單字</button>
          </div>

          <div class="training-grid">
            <article class="training-card">
              <span class="step-badge">錯題整理 10 分鐘</span>
              <h3>錯題變規則</h3>
              <label>
                <span>今日錯題 / 句子</span>
                <input id="ruleQuestionInput" type="text" placeholder="例如 Are you coming with us tomorrow?">
              </label>
              <label>
                <span>為什麼錯 / 規則</span>
                <textarea id="ruleInput" rows="3" placeholder="例如 Are you + V-ing = 問未來安排"></textarea>
              </label>
              <label>
                <span>我自己的類似句</span>
                <input id="ruleSentenceInput" type="text" placeholder="例如 Are you coming to the meeting tomorrow?">
              </label>
              <button id="saveRuleBtn" class="primary-btn" type="button">存成規則</button>
            </article>

            <article class="training-card">
              <span class="step-badge">句子輸出 10 分鐘</span>
              <h3>單字放進固定句型</h3>
              <div class="focus-word">
                <strong id="focusWord">word</strong>
                <span id="focusMeaning">中文意思</span>
              </div>
              <div id="patternList" class="pattern-list"></div>
              <label>
                <span>我的句子 1</span>
                <input class="own-sentence" type="text" placeholder="用今天的單字寫一句很簡單的英文">
              </label>
              <label>
                <span>我的句子 2</span>
                <input class="own-sentence" type="text" placeholder="換成你的生活情境">
              </label>
              <label>
                <span>我的句子 3</span>
                <input class="own-sentence" type="text" placeholder="再寫一句，不用難">
              </label>
              <button id="saveWordSentencesBtn" class="primary-btn" type="button">存我的句子</button>
            </article>

            <article class="training-card">
              <span class="step-badge">每日輸出 10 分鐘</span>
              <h3>今天我會多說 3 句</h3>
              <label>
                <span>生活句 1</span>
                <input class="daily-line" type="text" placeholder="I woke up late today.">
              </label>
              <label>
                <span>生活句 2</span>
                <input class="daily-line" type="text" placeholder="I drank coffee.">
              </label>
              <label>
                <span>生活句 3</span>
                <input class="daily-line" type="text" placeholder="English is painful, but I don't want to give up.">
              </label>
              <button id="saveDailyLinesBtn" class="primary-btn" type="button">存今日 3 句</button>
            </article>
          </div>
        </section>
      </section>

      <aside class="side">
        <section class="control-panel" aria-label="練習設定">
          <h2>設定</h2>
          <label>
            <span>每日題數</span>
            <input id="dailyTarget" type="number" min="5" max="80" step="5" value="20">
          </label>
          <label>
            <span>分類</span>
            <select id="categoryFilter">
              <option value="all">全部 5000 詞</option>
              <option value="core">Core 1-1000</option>
              <option value="common">Common 1001-2000</option>
              <option value="useful">Useful 2001-3000</option>
              <option value="broad">Broad 3001-4000</option>
              <option value="advanced">Advanced 4001-5000</option>
              <option value="wrong">匯入錯題</option>
            </select>
          </label>
          <label>
            <span>題型</span>
            <select id="modeFilter">
              <option value="mixed">混合</option>
              <option value="zh-choice">選中文翻譯</option>
              <option value="en-choice">選英文翻譯</option>
              <option value="blank">填空題</option>
              <option value="gept">英檢題</option>
              <option value="toeic">多益題</option>
            </select>
          </label>
        </section>

        <section class="control-panel" aria-label="今日輸出">
          <h2>今日輸出</h2>
          <div id="learningSummary" class="learning-summary"></div>
        </section>

        <section class="control-panel" aria-label="錯誤紀錄">
          <div class="panel-head">
            <h2>錯誤紀錄</h2>
            <button id="clearErrorsBtn" class="text-btn" type="button">清除</button>
          </div>
          <div id="errorList" class="error-list"></div>
        </section>

        <section class="control-panel" aria-label="單字查詢">
          <h2>單字庫</h2>
          <input id="searchInput" class="search-input" type="search" placeholder="搜尋單字或中文">
          <div id="wordList" class="word-list"></div>
        </section>
      </aside>
    </main>

    <script src="ogden-words.js"></script>
    <script src="wrong-words-seed.js"></script>
    <script src="script.js"></script>
  </body>
</html>
